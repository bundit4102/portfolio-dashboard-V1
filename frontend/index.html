<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio App</title>

<style>
body{
  font-family: Arial;
  background:#1c2b3a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#2c3e50;
  padding:30px;
  border-radius:12px;
  width:320px;
}

input,select,button{
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  background:#c9a84c;
  font-weight:bold;
  cursor:pointer;
}

.err{color:red;font-size:12px}
.ok{color:#4caf82;font-size:12px}
.hidden{display:none}
</style>

</head>
<body>

<div class="box">

<h2>Login</h2>

<input id="lUser" placeholder="Username">
<input id="lPass" type="password" placeholder="Password">
<div id="loginErr" class="err"></div>
<button onclick="doLogin()">Login</button>

<hr>

<h3>Register</h3>

<input id="rName" placeholder="Name">
<input id="rDept" placeholder="Department">
<input id="rUser" placeholder="Username">
<input id="rPass" type="password" placeholder="Password">
<input id="rPass2" type="password" placeholder="Confirm Password">

<select id="rRole">
  <option>Viewer</option>
  <option>Manager</option>
</select>

<div id="regErr" class="err"></div>
<div id="regOk" class="ok"></div>

<button onclick="doRegister()">Register</button>

</div>

<script>

const API = 'https://YOUR-APP.onrender.com';

const $ = id => document.getElementById(id);

// LOGIN
async function doLogin(){
  const u = $('lUser').value.trim();
  const p = $('lPass').value;

  $('loginErr').textContent='';

  try{
    const res = await fetch(API + '/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:u,password:p})
    });

    const result = await res.json();

    if(!result.success){
      $('loginErr').textContent='Login ไม่สำเร็จ';
      return;
    }

    alert('Login สำเร็จ: ' + result.user.name);

  }catch(e){
    $('loginErr').textContent='Server error';
  }
}

// REGISTER
async function doRegister(){
  const name=$('rName').value;
  const dept=$('rDept').value;
  const user=$('rUser').value;
  const pass=$('rPass').value;
  const pass2=$('rPass2').value;
  const role=$('rRole').value;

  $('regErr').textContent='';
  $('regOk').textContent='';

  if(pass!==pass2){
    $('regErr').textContent='Password ไม่ตรง';
    return;
  }

  try{
    const res = await fetch(API + '/api/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        username:user,
        password:pass,
        name:name,
        dept:dept,
        role:role
      })
    });

    const result = await res.json();

    if(!result.success){
      $('regErr').textContent='สมัครไม่สำเร็จ';
      return;
    }

    $('regOk').textContent='สมัครสำเร็จ รออนุมัติ';

  }catch(e){
    $('regErr').textContent='Server error';
  }
}

</script>

</body>
</html>
